name: Bug report
description: Report a bug or broken behavior
title: ""
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.
        A helpful report usually includes:
        what you expected, what you did, and what happened instead.
        If you can reproduce the issue reliably, detailed steps can help us investigate and fix it faster.
        Logs, screenshots, and videos are optional, but for crashes a log file is especially helpful and may avoid extra back-and-forth.
        An AI-assisted reply may be posted initially, and maintainers may follow up if needed.
        Reports without enough detail to investigate may be closed until more information is available.

  - type: dropdown
    id: version
    attributes:
      label: Mod version
      options:
        - 1.6.0
        - older version
        - development build / unknown
    validations:
      required: true

  - type: textarea
    id: bug-detail
    attributes:
      label: What did you expect, what did you do, and what happened?
      description: At minimum, tell us what you expected, what you did, and what happened instead.
      placeholder: |
        Expected: I expected AAA to happen.
        Did: I did BBB.
        Happened: CCC happened instead.
    validations:
      required: true

  - type: textarea
    id: steps-for-reproduce-bug
    attributes:
      label: Detailed reproduction steps
      description: Optional. If you can reproduce it reliably, detailed steps may help us fix it faster.
      placeholder: |
        1. Do AAA
        2. Open BBB
        3. Click CCC
        4. The issue happens

  - type: textarea
    id: mods-when-bug-occurred
    attributes:
      label: Other mods involved
      description: Optional. If other mods may be involved, list their names. Compatibility issues may take longer to investigate and may not always be addressed.
      placeholder: |
        Awesome Weapon v1.2.3
        Awesome NPC v4.5.6
        ...

  - type: textarea
    id: file-attachments
    attributes:
      label: Logs, screenshots, videos, etc.
      description: Optional, but especially helpful for crashes. You can drag and drop files here if they help explain the issue.

  - type: markdown
    attributes:
      value: Thank you for the report.
