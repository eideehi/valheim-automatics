name: Bug report
description: Report a bug or broken behavior
title: ""
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.
        A useful report includes what you expected, what you did, and what happened instead.
        If you can reproduce the issue reliably, include detailed steps.
        Logs, screenshots, and videos are optional. For crashes, a log file is especially helpful.
        An AI-assisted reply may be posted first, and maintainers may follow up if needed.
        Reports without enough detail to investigate may be closed until more information is available.

  - type: dropdown
    id: version
    attributes:
      label: Mod version
      options:
        - latest release
        - older release
        - development build / unknown
    validations:
      required: true

  - type: textarea
    id: bug-detail
    attributes:
      label: What did you expect, what did you do, and what happened?
      description: At minimum, tell us what you expected, what you did, and what happened instead.
      placeholder: |
        Expected: I expected AAA to happen.
        Did: I did BBB.
        Happened: CCC happened instead.
    validations:
      required: true

  - type: textarea
    id: steps-for-reproduce-bug
    attributes:
      label: Detailed reproduction steps
      description: Optional. If you can reproduce it reliably, include detailed steps.
      placeholder: |
        1. Do AAA
        2. Open BBB
        3. Click CCC
        4. The issue happens

  - type: textarea
    id: mods-when-bug-occurred
    attributes:
      label: Other mods involved
      description: Optional. If other mods may be involved, list them. Compatibility issues may take longer to investigate and may not always be addressed.
      placeholder: |
        Awesome Weapon v1.2.3
        Awesome NPC v4.5.6
        ...

  - type: textarea
    id: file-attachments
    attributes:
      label: Logs, screenshots, or videos
      description: Optional. For crashes, a log file is especially helpful. You can drag and drop files here if they help explain the issue.

  - type: markdown
    attributes:
      value: Thank you for the report.
